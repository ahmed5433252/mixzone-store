<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaming Zone | Mix Zone</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}

body{
background:#0f0c29;
color:white;
overflow-x:hidden;
}

/* Loading Screen */
#loader{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.loader-text{
font-size:30px;
color:#00f0ff;
animation:blink 1s infinite alternate;
}

@keyframes blink{
from{opacity:0.3;}
to{opacity:1;}
}

/* Navbar */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 50px;
background:#000;
box-shadow:0 0 20px #00f0ff55;
}

nav a{
color:white;
text-decoration:none;
margin:0 15px;
transition:.3s;
}

nav a:hover{color:#00f0ff}

/* Parallax */
.hero{
height:60vh;
background:url("https://images.unsplash.com/photo-1605902711622-cfb43c4437d1?auto=format&fit=crop&w=1600&q=80") center/cover fixed;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:50px;
color:#00f0ff;
text-shadow:0 0 25px #00f0ff;
}

.hero p{
margin-top:15px;
}

/* Cards Section */
.sections{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
padding:60px;
}

.card{
background:#111827;
border-radius:15px;
overflow:hidden;
transition:.4s;
position:relative;
transform-style:preserve-3d;
}

/* Neon Animation Border */
.card::before{
content:"";
position:absolute;
inset:-2px;
border-radius:15px;
background:linear-gradient(45deg,#00f0ff,#ff00ff,#00f0ff);
background-size:300%;
z-index:-1;
animation:neon 6s linear infinite;
}

@keyframes neon{
0%{background-position:0%}
100%{background-position:300%}
}

/* 3D Hover */
.card:hover{
transform:rotateY(10deg) rotateX(5deg) scale(1.05);
box-shadow:0 0 40px #00f0ff;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card h3{
padding:15px;
text-align:center;
color:#00f0ff;
}

.card button{
margin:0 20px 20px;
padding:10px;
width:calc(100% - 40px);
border:none;
border-radius:25px;
background:#00f0ff;
color:black;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.card button:hover{
background:white;
}

/* Footer */
footer{
background:#000;
padding:30px;
text-align:center;
margin-top:40px;
}
</style>
</head>

<body>

<div id="loader">

© 2026 Mix Zone Gaming | Ahmed Waleed

<script>

window.addEventListener("load",function(){
document.getElementById("loader").style.display="none";
});

/* WhatsApp */
function goWhats(product){
let phone="201552998637";
let message="مرحبًا 👋 أريد الاستفسار عن " + product + " في Gaming Zone";
let url="https://wa.me/"+phone+"?text="+encodeURIComponent(message);
window.open(url,"_blank");
}
</script>

</body>
</html>
