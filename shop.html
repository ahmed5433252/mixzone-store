<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mix Zone Store</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
}

nav{
background:#020617;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
position:relative;
color:#00eaff;
}

.owner{
position:absolute;
left:20px;
top:22px;
font-size:14px;
color:#f97316;
}

.cart-icon{
position:absolute;
right:20px;
top:18px;
cursor:pointer;
font-size:20px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:40px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:15px;
text-align:center;
transition:0.3s;
border:1px solid #334155;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 0 20px #00eaff;
}

.icon{
font-size:50px;
margin-bottom:15px;
}

h3{
color:#00eaff;
margin-bottom:10px;
}

.price{
color:#f97316;
font-size:18px;
font-weight:bold;
margin:10px 0;
}

button{
background:#00eaff;
border:none;
padding:8px 20px;
border-radius:20px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
margin-top:5px;
}

button:hover{
background:#f97316;
}

/* Cart */
.cart{
position:fixed;
top:0;
right:-350px;
width:300px;
height:100%;
background:#111827;
padding:20px;
transition:0.4s;
overflow-y:auto;
}

.cart.active{
right:0;
}

.cart h2{
margin-bottom:15px;
color:#00eaff;
}

.cart-item{
display:flex;
justify-content:space-between;
font-size:14px;
margin-bottom:10px;
border-bottom:1px solid #334155;
padding-bottom:5px;
}

.remove{
color:red;
cursor:pointer;
}

.checkout{
margin-top:15px;
background:#f97316;
width:100%;
}
</style>
</head>

<body>

<nav>
Mix Zone Store
<div class="owner">Ahmed Waleed</div>
<div class="cart-icon" onclick="toggleCart()">🛒 (<span id="count">0</span>)</div>
</nav>

<div class="container">

<div class="card">
<div class="icon">📱</div>
<h3>Samsung Galaxy A06</h3>
<div class="price">5500 جنيه</div>
<button onclick="addToCart('Samsung Galaxy A06',5500)">أضف للسلة</button>
</div>

<div class="card">
<div class="icon">💻</div>
<h3>HP ProBook 450</h3>
<div class="price">18000 جنيه</div>
<button onclick="addToCart('HP ProBook 450',18000)">أضف للسلة</button>
</div>

<div class="card">
<div class="icon">🎧</div>
<h3>AirPods 3</h3>
<div class="price">1200 جنيه</div>
<button onclick="addToCart('AirPods 3',1200)">أضف للسلة</button>
</div>

<div class="card">
<div class="icon">⌚</div>
<h3>X8 Ultra Plus</h3>
<div class="price">950 جنيه</div>
<button onclick="addToCart('X8 Ultra Plus',950)">أضف للسلة</button>
</div>

<div class="card">
<div class="icon">⌨️</div>
<h3>RGB Keyboard</h3>
<div class="price">750 جنيه</div>
<button onclick="addToCart('Keyboard',750)">أضف للسلة</button>
</div>

<div class="card">
<div class="icon">🖱</div>
<h3>RGB Mouse</h3>
<div class="price">450 جنيه</div>
<button onclick="addToCart('Mouse',450)">أضف للسلة</button>
</div>

</div>

<div class="cart" id="cart">
<h2>سلة المشتريات</h2>
<div id="cartItems"></div>
<h3>الإجمالي: <span id="total">0</span> جنيه</h3>
<button class="checkout" onclick="goCheckout()">إتمام الطلب</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function saveCart(){
localStorage.setItem("cart",JSON.stringify(cart));
}

function addToCart(name,price){
cart.push({name,price});
updateCart();
saveCart();
}

function updateCart(){
let items=document.getElementById("cartItems");
let total=0;
items.innerHTML="";

cart.forEach((item,index)=>{
total+=item.price;
items.innerHTML+=`
<div class="cart-item">
<span>${item.name} - ${item.price} جنيه</span>
<span class="remove" onclick="removeItem(${index})">❌</span>
</div>`;
});

document.getElementById("total").innerText=total;
document.getElementById("count").innerText=cart.length;
}

function removeItem(index){
cart.splice(index,1);
updateCart();
saveCart();
}

function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}

function goCheckout(){
window.location.href="checkout.html";
}

updateCart();
</script>
<style>
.chat-btn{
position:fixed;
bottom:20px;
right:20px;
background:#f97316;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
cursor:pointer;
z-index:1000;
}

.chat-box{
position:fixed;
bottom:90px;
right:20px;
width:300px;
background:#111827;
padding:15px;
border-radius:15px;
display:none;
}

.chat-messages{
height:200px;
overflow-y:auto;
font-size:14px;
margin-bottom:10px;
}

.chat-input{
display:flex;
}

.chat-input input{
flex:1;
padding:8px;
border:none;
border-radius:5px;
}

.chat-input button{
padding:8px;
border:none;
background:#00eaff;
cursor:pointer;
}
</style>

<div class="chat-btn" onclick="toggleChat()">💬</div>

<div class="chat-box" id="chatBox">
<div class="chat-messages" id="chatMessages">
<div>أهلاً 👋 أنا مساعد Mix Zone. بتدور على إيه؟</div>
</div>
<div class="chat-input">
<input type="text" id="userInput" placeholder="اكتب هنا...">
<button onclick="sendMessage()">إرسال</button>
</div>
</div>

<script>
function toggleChat(){
let box=document.getElementById("chatBox");
box.style.display=box.style.display==="block"?"none":"block";
}

function sendMessage(){
let input=document.getElementById("userInput");
let msg=input.value.toLowerCase();
let chat=document.getElementById("chatMessages");

if(!msg) return;

chat.innerHTML+=`<div>أنت: ${msg}</div>`;

let reply="";

if(msg.includes("موبايل") || msg.includes("هاتف")){
reply="أنصحك بـ Samsung Galaxy A06 بسعر 5500 جنيه 🔥";
}
else if(msg.includes("لابتوب")){
reply="عندك HP ProBook 450 بسعر 18000 جنيه 💻";
}
else if(msg.includes("سماعة") || msg.includes("ايربود")){
reply="AirPods 3 اختيار ممتاز بسعر 1200 جنيه 🎧";
}
else if(msg.includes("ساعه")){
reply="X8 Ultra Plus بـ 950 جنيه ⌚";
}
else if(msg.includes("كيبورد")){
reply="RGB Keyboard بـ 750 جنيه ⌨️";
}
else if(msg.includes("ماوس")){
reply="RGB Mouse بـ 450 جنيه 🖱";
}
else{
reply="قولّي بتدور على إيه أو ميزانيتك كام؟";
}

chat.innerHTML+=`<div style="color:#00eaff">البوت: ${reply}</div>`;
input.value="";
chat.scrollTop=chat.scrollHeight;
}
</script>
</body>
</html>
