<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mix Zone Store</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
}

nav{
background:#020617;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
position:relative;
color:#00eaff;
}

.owner{
position:absolute;
left:20px;
top:22px;
font-size:14px;
color:#f97316;
}

.cart-icon{
position:absolute;
right:20px;
top:18px;
cursor:pointer;
font-size:20px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:40px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:15px;
text-align:center;
transition:0.3s;
border:1px solid #334155;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 0 20px #00eaff;
}

.icon{
font-size:50px;
margin-bottom:15px;
}

h3{
color:#00eaff;
margin-bottom:10px;
}

.price{
color:#f97316;
font-size:18px;
font-weight:bold;
margin:10px 0;
}

button{
background:#00eaff;
border:none;
padding:8px 20px;
border-radius:20px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

button:hover{
background:#f97316;
}

/* Cart Panel */
.cart{
position:fixed;
top:0;
right:-350px;
width:300px;
height:100%;
background:#111827;
padding:20px;
transition:0.4s;
overflow-y:auto;
}

.cart.active{
right:0;
}

.cart h2{
margin-bottom:15px;
color:#00eaff;
}

.cart-item{
margin-bottom:10px;
font-size:14px;
border-bottom:1px solid #334155;
padding-bottom:5px;
}

.checkout{
margin-top:15px;
background:#f97316;
width:100%;
}
</style>
</head>

<body>

<nav>
Mix Zone Store
<div class="owner">Ahmed Waleed</div>
<div class="cart-icon" onclick="toggleCart()">🛒 (<span id="count">0</span>)</div>
</nav>

<div class="container">

<div class="card">
<div class="icon">📱</div>
<h3>Samsung Galaxy A06</h3>
<div class="price">5500</div>
<button onclick="addToCart('Samsung Galaxy A06',5500)">أضف للسلة</button>
</div>

<div class="card">
<div class="icon">💻</div>
<h3>HP ProBook 450</h3>
<div class="price">18000</div>
<button onclick="addToCart('HP ProBook 450',18000)">أضف للسلة</button>
</div>

<div class="card">
<div class="icon">🎧</div>
<h3>AirPods 3</h3>
<div class="price">1200</div>
<button onclick="addToCart('AirPods 3',1200)">أضف للسلة</button>
</div>

<div class="card">
<div class="icon">⌚</div>
<h3>X8 Ultra Plus</h3>
<div class="price">950</div>
<button onclick="addToCart('X8 Ultra Plus',950)">أضف للسلة</button>
</div>

<div class="card">
<div class="icon">⌨️</div>
<h3>RGB Keyboard</h3>
<div class="price">750</div>
<button onclick="addToCart('Keyboard',750)">أضف للسلة</button>
</div>

<div class="card">
<div class="icon">🖱</div>
<h3>RGB Mouse</h3>
<div class="price">450</div>
<button onclick="addToCart('Mouse',450)">أضف للسلة</button>
</div>

</div>

<div class="cart" id="cart">
<h2>سلة المشتريات</h2>
<div id="cartItems"></div>
<h3>الإجمالي: <span id="total">0</span> جنيه</h3>
<button class="checkout" onclick="checkout()">إتمام الطلب</button>
</div>

<script>
let cart=[];
function addToCart(name,price){
cart.push({name,price});
updateCart();
}
function updateCart(){
let items=document.getElementById("cartItems");
let total=0;
items.innerHTML="";
cart.forEach(item=>{
total+=item.price;
items.innerHTML+=`<div class="cart-item">${item.name} - ${item.price} جنيه</div>`;
});
document.getElementById("total").innerText=total;
document.getElementById("count").innerText=cart.length;
}
function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}
function checkout(){
let phone="201552998637";
let message="طلب جديد:%0A";
cart.forEach(item=>{
message+=item.name+" - "+item.price+" جنيه%0A";
});
window.open("https://wa.me/"+phone+"?text="+message);
}
</script>

</body>
</html>
