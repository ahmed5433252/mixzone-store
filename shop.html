body{

nav{
display:flex;

}

.card img{

height:180px;
object-fit:cover;
border-radius:10px;
}

.price{

color:#ff6a00;

}

button{
background:#00eaff;
border:none;
padding:10px 20px;
border-radius:20px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

button:hover{
transform:scale(1.1);

footer{

padding:20px;

margin-top:50px;
