<!DOCTYPE html>
<html lang="ar">
<head>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
overflow-x:hidden;
}

/* Navbar */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 50px;
background:#020617;
box-shadow:0 0 20px #00f0ff55;
}

nav a{color:white;text-decoration:none;margin:0 15px;}
nav a:hover{color:#00f0ff}

/* Title */
h1{
text-align:center;
margin:40px 0;
color:#00f0ff;
text-shadow:0 0 20px #00f0ff;
}

/* Grid */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
padding:40px;
}

/* Card */
.card{
background:#1e293b;
border-radius:15px;
padding:15px;
transition:.5s;
position:relative;
transform:translateY(40px);
opacity:0;
}

.card.show{
transform:translateY(0);
opacity:1;
}

.card:hover{
transform:translateY(-10px) rotateX(5deg) rotateY(5deg);
box-shadow:0 0 30px #00f0ff;
}

.card img{
width:100%;
height:190px;
object-fit:cover;
border-radius:10px;
}

.card h3{
margin:10px 0;
color:#00f0ff;
font-size:18px;
}

.specs{
font-size:13px;
color:#bbb;
margin-bottom:8px;
}

.price{
font-weight:bold;
margin:8px 0;
}

.badge{
position:absolute;
top:10px;
left:10px;
background:#ff0055;
padding:5px 10px;
border-radius:20px;
font-size:12px;
}

button{
padding:10px;
width:100%;
border:none;
border-radius:20px;
background:#00f0ff;
color:black;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
background:white;
transform:scale(1.05);
}

/* Cart */
.cart{
position:fixed;
top:0;
right:0;
width:300px;
height:100%;
background:#0f172a;
box-shadow:-5px 0 20px #00f0ff55;
padding:20px;
overflow-y:auto;
}

.cart h2{
text-align:center;
margin-bottom:20px;
color:#00f0ff;
}

.cart-item{
margin-bottom:15px;
border-bottom:1px solid #333;
padding-bottom:10px;
font-size:14px;
}

.total{
margin-top:20px;
font-weight:bold;
}

.remove{
background:red;
color:white;
margin-top:5px;
}
</style>
</head>

<body>

<nav>
<div style="color:#00f0ff;font-weight:bold;">Mix Zone</div>
<div>
<a href="index.html">الرئيسية</a>
<a href="gaming.html">Gaming</a>
</div>
</nav>

image:"https://images.unsplash.com/photo-1580913428735-bd3c269d6a82?auto=format&fit=crop&w=600&q=80"}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function displayProducts(){
let container=document.getElementById("products");
container.innerHTML="";
products.forEach(p=>{
container.innerHTML+=`
<div class="card">
${p.badge ? '<div class="badge">Bestseller</div>' : ''}
<img src="${p.image}">
<h3>${p.name}</h3>
<p class="specs">${p.specs}</p>
<p class="price">${p.price} جنيه</p>
<button onclick="addToCart(${p.id})">إضافة للسلة</button>
</div>
`;
});
animateOnScroll();
}

function addToCart(id){
let product=products.find(p=>p.id===id);
cart.push(product);
localStorage.setItem("cart",JSON.stringify(cart));
displayCart();
}

function displayCart(){
let cartBox=document.getElementById("cartItems");
cartBox.innerHTML="";
let total=0;

cart.forEach((item,index)=>{
total+=item.price;
cartBox.innerHTML+=`
<div class="cart-item">
<p>${item.name}</p>
<p>${item.price} جنيه</p>
<button class="remove" onclick="removeItem(${index})">حذف</button>
</div>
`;
});

document.getElementById("totalPrice").innerText="الإجمالي: "+total+" جنيه";
}

function removeItem(index){
cart.splice(index,1);
localStorage.setItem("cart",JSON.stringify(cart));
displayCart();
}

/* Scroll Animation */
function animateOnScroll(){
let cards=document.querySelectorAll(".card");
let observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("show");
}
});
},{threshold:0.2});
cards.forEach(card=>observer.observe(card));
}

displayProducts();
displayCart();

</script>
