<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mix Zone Store</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
overflow-x:hidden;
}

/* Navbar */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 50px;
background:#020617;
box-shadow:0 0 20px #00f0ff55;
}

.logo-text{
font-size:22px;
font-weight:bold;
color:#00f0ff;
text-shadow:0 0 15px #00f0ff;
}

nav a{
color:white;
text-decoration:none;
margin:0 15px;
transition:.3s;
}
nav a:hover{color:#00f0ff}

/* Slider */
.slider{
position:relative;
width:100%;
height:80vh;
overflow:hidden;
}

.slides{
display:flex;
width:300%;
height:100%;
transition:1s;
}

.slide{
width:100%;
flex-shrink:0;
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.slide h1{
font-size:50px;
background:rgba(0,0,0,0.5);
padding:20px 40px;
border-radius:10px;
color:#00f0ff;
}

.slide1{background-image:url("https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?auto=format&fit=crop&w=1600&q=80");}
.slide2{background-image:url("https://images.unsplash.com/photo-1585386959984-a41552231658?auto=format&fit=crop&w=1600&q=80");}
.slide3{background-image:url("https://images.unsplash.com/photo-1517336714731-489689fd1ca8?auto=format&fit=crop&w=1600&q=80");}

/* Countdown */
.countdown{
background:#00f0ff;
color:black;
text-align:center;
padding:25px;
font-size:22px;
font-weight:bold;
}

/* Products */
.products{
padding:70px 50px;
text-align:center;
}

.products h2{
color:#00f0ff;
margin-bottom:40px;
}

.product-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
transition:.3s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 25px #00f0ff88;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
margin-bottom:15px;
}

.card button{
padding:10px 25px;
border:none;
border-radius:20px;
background:#00f0ff;
color:black;
cursor:pointer;
font-weight:bold;
}

footer{
background:#020617;
padding:30px;
text-align:center;
margin-top:40px;
}
</style>
</head>

<body>

<nav>
<div class="logo-text">Mix Zone Store</div>
<div>
<a href="index.html">الرئيسية</a>
<a href="shop.html">المتجر</a>
<a href="checkout.html">الدفع</a>
</div>
</nav>

<!-- Slider -->
<div class="slider">
<div class="slides" id="slides">

<div class="slide slide1">
<h1>أحدث الموبايلات</h1>
</div>

<div class="slide slide2">
<h1>أفضل سماعات بلوتوث</h1>
</div>

<div class="slide slide3">
<h1>أقوى اللابتوبات</h1>
</div>

</div>
</div>

<!-- Countdown -->
<div class="countdown">
🔥 العرض ينتهي خلال:
<span id="timer"></span>
</div>

<!-- Products -->
<section class="products">
<h2>منتجات مميزة</h2>

<div class="product-grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?auto=format&fit=crop&w=600&q=80">
<h3>موبايلات حديثة</h3>
<button>عرض المنتجات</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1585386959984-a41552231658?auto=format&fit=crop&w=600&q=80">
<h3>سماعات بلوتوث</h3>
<button>عرض المنتجات</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8?auto=format&fit=crop&w=600&q=80">
<h3>لابتوبات</h3>
<button>عرض المنتجات</button>
</div>

</div>
</section>

<footer>
© 2026 Mix Zone Store | Ahmed Waleed
</footer>

<script>
/* Slider Auto */
let index = 0;
const slides = document.getElementById("slides");

setInterval(()=>{
index++;
if(index>2){index=0;}
slides.style.transform = "translateX(-"+ index*100 +"%)";
},3000);

/* Countdown */
let countDownDate = new Date();
countDownDate.setHours(countDownDate.getHours() + 5);

let x = setInterval(function() {
let now = new Date().getTime();
let distance = countDownDate - now;

let hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
let minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
let seconds = Math.floor((distance % (1000 * 60)) / 1000);

document.getElementById("timer").innerHTML = hours + "h "
+ minutes + "m " + seconds + "s ";

if (distance < 0) {
clearInterval(x);
document.getElementById("timer").innerHTML = "انتهى العرض";
}
}, 1000);
</script>

</body>
</html>
